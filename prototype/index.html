const _sc = new Map();
function S(css) {
  if (_sc.has(css)) return _sc.get(css);
  const o = {};
  css.split(';').forEach(d => {
    const i = d.indexOf(':'); if (i < 0) return;
    const k = d.slice(0, i).trim(); if (!k) return;
    const val = d.slice(i + 1).trim();
    o[k.startsWith('--') ? k : k.replace(/-([a-z])/g, (_, c) => c.toUpperCase())] = val;
  });
  if (_sc.size > 4000) _sc.clear();
  _sc.set(css, o);
  return o;
}

      detailLinks = dTask.links.map(l => {
        const c = clientById[l.clientId]; if (!c) return null; const pct = pctOf(dTask, l); const active = l.clientId === activeClientId;
        return { clientId: l.clientId, name: c.name, ini: c.ini, avStyle: `width:22px;height:22px;flex:none;border-radius:99px;background:${c.color};color:#fff;display:grid;place-items:center;font-size:9.5px;font-weight:700`,
          pct, rowStyle: `display:flex;align-items:center;gap:10px;cursor:pointer;padding:7px 8px;border-radius:8px;border:1.5px solid ${active ? accent : 'transparent'};background:${active ? '#f7f8ff' : 'transparent'}`,
          onSelect: () => this.st(() => ({ detailActiveClient: l.clientId })),
          onRemove: (e) => { e.stopPropagation();
            this.st(st => ({ tasks: st.tasks.map(x => x.id !== dTask.id ? x : { ...x, links: x.links.filter(ll => ll.clientId !== l.clientId) }), detailActiveClient: st.detailActiveClient === l.clientId ? null : st.detailActiveClient })); } };
      }).filter(Boolean);
      const dq = s.detailClientSearch.trim().toLowerCase();
      detailAvailableClients = s.clients.filter(c => !dTask.links.some(l => l.clientId === c.id)).filter(c => !dq || c.name.toLowerCase().includes(dq)).map(c => ({ id: c.id, name: c.name,
        onPick: () => this.st(st => ({ detailActiveClient: c.id, tasks: st.tasks.map(x => x.id === dTask.id ? { ...x, links: [...x.links, { clientId: c.id, done: [] }] } : x) })) }));
      detailSubtasks = dTask.subtasks.map(sub => {
        const done = activeLink ? activeLink.done.includes(sub.id) : false;
        return { id: sub.id, title: sub.title, done,
          boxStyle: `width:18px;height:18px;flex:none;border-radius:5px;display:grid;place-items:center;background:${done ? progColor(100) : '#fff'};border:1.5px solid ${done ? progColor(100) : '#d8d8d4'};opacity:${activeClient ? 1 : .5}`,
          textStyle: `font-size:12.5px;flex:1;color:${done ? '#a0a3ad' : '#33363f'};text-decoration:${done ? 'line-through' : 'none'}`,
          toggle: () => { if (!activeClientId) return; this.st(st => ({ tasks: st.tasks.map(x => x.id !== dTask.id ? x : { ...x, links: x.links.map(ll => ll.clientId !== activeClientId ? ll : { ...ll, done: ll.done.includes(sub.id) ? ll.done.filter(d => d !== sub.id) : [...ll.done, sub.id] }) }) })); },
          onRemove: () => this.st(st => ({ tasks: st.tasks.map(x => x.id !== dTask.id ? x : { ...x, subtasks: x.subtasks.filter(s2 => s2.id !== sub.id), links: x.links.map(ll => ({ ...ll, done: ll.done.filter(d => d !== sub.id) })) }) })) };
      });
      detailComments = (dTask.comments || []).map(cm2 => { const p = byId[cm2.author] || { name: 'Equipe', ini: '?', color: '#8a8d98' };
        return { id: cm2.id, text: cm2.text, time: cm2.time, name: p.name, ini: p.ini, avStyle: av(p, 26) }; });
    }

    // ---- dashboard (computed from live data) ----
    const taskAvgPct = (t) => { const ps = t.links.map(l => pctOf(t, l)); return ps.length ? Math.round(ps.reduce((a, b) => a + b, 0) / ps.length) : null; };
    const isTaskDone = (t) => { const p = taskAvgPct(t); return p !== null && p >= 100; };
    const openTasksArr = s.tasks.filter(t => !isTaskDone(t));
    const lateTasks = openTasksArr.filter(t => t.dueDate && t.dueDate < todayISO);
    const attnClients = s.clients.filter(c => c.status !== 'Em dia').length;
    const in7d = new Date(now); in7d.setDate(in7d.getDate() + 7);
    const in7ISO = isoDate(in7d);
    const next7 = s.events.filter(ev => ev.date >= todayISO && ev.date <= in7ISO);
    const avgAdeq = s.clients.length ? Math.round(s.clients.reduce((a, c) => a + c.pct, 0) / s.clients.length) : 0;
    const kpis = [
      { label: 'Clientes em adequação', value: String(s.clients.length), suffix: 'ativos', delta: attnClients + ' em situação crítica ou atenção', dc: attnClients ? '#b3512e' : '#0e7a6f' },
      { label: 'Tarefas abertas', value: String(openTasksArr.length), suffix: 'de ' + s.tasks.length, delta: lateTasks.length + ' em atraso', dc: lateTasks.length ? '#b3402e' : '#0e7a6f' },
      { label: 'Prazos nos próximos 7 dias', value: String(next7.length), suffix: next7.length ? 'até ' + toBRshort(in7ISO) : '', delta: next7.length ? next7.slice(0, 3).map(e => e.title.split(' — ')[0]).join(', ') : 'Nenhum prazo na janela', dc: '#6b6e78' },
      { label: 'Adequação média da carteira', value: avgAdeq + '%', suffix: '', delta: 'média de ' + s.clients.length + ' clientes', dc: '#0e7a6f' }
    ].map(k => ({ ...k, deltaStyle: `font-size:11px;font-weight:600;margin-top:6px;color:${k.dc}` }));
    const phases = [
      { year: '2026', title: 'Ano-teste', desc: 'CBS 0,9% + IBS 0,1% destacados na NF-e; recolhimento dispensado', from: 2020, to: 2026 },
      { year: '2027', title: 'CBS integral', desc: 'Extinção de PIS/Cofins; Imposto Seletivo em vigor; IPI zerado (exceto ZFM)', from: 2027, to: 2027 },
      { year: '2028', title: 'Consolidação', desc: 'CBS e IS plenos; IBS mantém alíquota de teste', from: 2028, to: 2028 },
      { year: '2029–32', title: 'Transição IBS', desc: 'ICMS e ISS reduzidos gradualmente; IBS sobe na mesma proporção', from: 2029, to: 2032 },
      { year: '2033', title: 'Regime pleno', desc: 'Extinção de ICMS e ISS; IVA dual em vigência integral', from: 2033, to: 2077 },
      { year: '2078', title: 'Fim da compensação', desc: 'Encerramento dos ajustes federativos de receita', from: 2078, to: 9999, dim: true }
    ].map(ph => { const on = yr >= ph.from && yr <= ph.to; return { ...ph,
      style: `border:1px solid ${on ? accent : '#ececea'};background:${on ? '#f7f8ff' : '#fafaf8'};border-radius:10px;padding:12px;opacity:${ph.dim ? .55 : 1}`,
      yearStyle: `display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;color:${on ? '#fff' : '#5b5f6b'};background:${on ? accent : '#ececea'}` }; });
    const upcoming = s.events.filter(ev => ev.date >= todayISO).slice(0, 6).map((ev, i) => ({ ...ev, key: i,
      dateLabel: toBRshort(ev.date),
      dateStyle: `font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#5b5f6b;width:44px`,
      dot: `width:8px;height:8px;flex:none;border-radius:99px;background:${tipoColor[ev.tipo]}`,
      tipoLabel: tipoLabel[ev.tipo],
      badge: `font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:#f4f4f2;color:#6b6e78` }));
    const openByResp = s.team.map(p => ({ p, count: openTasksArr.filter(t => t.people.includes(p.id)).length }));
    const maxLoad = Math.max(...openByResp.map(o => o.count), 1);
    const load = openByResp.map(({ p, count }) => ({ id: p.id, ini: p.ini, name: p.name, count, avStyle: av(p, 22),
      barStyle: `width:${Math.round(count / maxLoad * 100)}%;height:100%;background:${p.color};border-radius:99px` }));
    const lateBox = lateTasks.length ? {
      title: lateTasks.length + (lateTasks.length === 1 ? ' tarefa em atraso' : ' tarefas em atraso'),
      text: lateTasks.slice(0, 3).map(t => t.title).join(' · ') + (lateTasks.length > 3 ? ' e mais…' : '')
    } : null;

    // ---- mudanças (Prazos em cards) ----
    const sevMap = {
      informativo: { label: 'Informativo', dot: '#8a8d98', tagBg: '#ececea', tagFg: '#5b5f6b' },
      critico: { label: 'Crítico', dot: '#d64545', tagBg: '#fdecea', tagFg: '#c0392b' },
      importante: { label: 'Importante', dot: '#c98a2e', tagBg: '#fdf3e6', tagFg: '#b5750f' }
    };
    const badgeMap = { SISTEMAS: { bg: '#f1eafe', fg: '#7c3aed' }, NFS: { bg: '#e8f5ec', fg: '#1f9254' } };
    const buildCard = (c) => {
      const sv = sevMap[c.severity] || sevMap.informativo;
      const bd = c.badge ? (badgeMap[c.badge] || { bg: '#f4f4f2', fg: '#6b6e78' }) : null;
      return { ...c,
        dot: `width:8px;height:8px;border-radius:99px;background:${sv.dot}`,
        sevTag: `font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;background:${sv.tagBg};color:${sv.tagFg}`,
        sevLabel: sv.label, notEditing: !c.editing, hasDesc: !!c.desc && !c.editing, hasBadge: !!c.badge,
        badgeStyle: bd ? `margin-left:auto;flex:none;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;background:${bd.bg};color:${bd.fg}` : '',
        titleVal: c.title,
        onTitleChange: (e) => { const v = e.target.value; this.st(st => ({ chgs: st.chgs.map(x => x.id === c.id ? { ...x, title: v } : x) })); },
        onTitleKey: (e) => {
          if (e.key === 'Enter') this.st(st => ({ chgs: st.chgs.map(x => x.id === c.id ? { ...x, editing: false, title: (x.title || '').trim() || 'Nova mudança' } : x) }));
          if (e.key === 'Escape') this.st(st => ({ chgs: st.chgs.filter(x => x.id !== c.id) }));
        },
        onDel: () => this.st(st => ({ chgs: st.chgs.filter(x => x.id !== c.id) })) };
    };
    const monthKeys = [...new Set(s.chgs.map(c => c.month))].sort();
    const monthGroups = monthKeys.map(mk => {
      const [yy, mmn] = mk.split('-').map(Number);
      const label = new Date(yy, mmn - 1, 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
      return { key: mk, label, cards: s.chgs.filter(c => c.month === mk).map(buildCard),
        onAdd: () => this.st(st => ({ chgs: [...st.chgs, { id: Date.now(), month: mk, severity: 'informativo', title: '', desc: '', date: toBRfull(todayISO), badge: '', editing: true }] })),
        onDelGroup: () => this.st(st => ({ chgs: st.chgs.filter(c => c.month !== mk) })) };
    });

    // ---- clients ----
    const regimes = ['Todos', 'Lucro Real', 'Lucro Presumido', 'Simples Nacional'];
    const cliFilters = regimes.map(r => ({ label: r, go: () => this.st(() => ({ cliFilter: r })),
      style: `font-size:12px;font-weight:600;padding:6px 12px;border-radius:99px;cursor:pointer;border:1px solid ${s.cliFilter === r ? accent : '#e2e2de'};color:${s.cliFilter === r ? '#fff' : '#4b4e58'};background:${s.cliFilter === r ? accent : '#fff'}` }));
    const stColor = { 'Em dia': ['#e8f5f0', '#0e7a6f'], 'Atenção': ['#fdf6ef', '#9a5b1f'], 'Crítico': ['#fdf2f0', '#b3402e'] };
    const clients = s.clients.filter(c => s.cliFilter === 'Todos' || c.regime === s.cliFilter).map(c => {
      const p = byId[c.resp] || s.team[0];
      return { ...c, respIni: p.ini, respName: p.name.split(' ')[0], avStyle: av(p, 22),
        barStyle: `width:${c.pct}%;height:100%;border-radius:99px;background:${c.pct < 35 ? '#b3402e' : c.pct < 60 ? '#c98a2e' : '#0e7a6f'}`,
        badge: `font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;text-align:center;background:${(stColor[c.status] || stColor['Em dia'])[0]};color:${(stColor[c.status] || stColor['Em dia'])[1]}`,
        onOpen: () => this.st(() => ({ clientView: 'detail', clientDetailId: c.id })) };
    });

    // ---- client detail ----
    let clientDetail = null, clientDetailTasks = [];
    const dClient = s.clients.find(c => c.id === s.clientDetailId);
    if (dClient) {
      const p = byId[dClient.resp] || s.team[0];
      clientDetailTasks = s.tasks.filter(t => t.links.some(l => l.clientId === dClient.id)).map(t => {
        const link = t.links.find(l => l.clientId === dClient.id); const pct = pctOf(t, link);
        const cm = catMeta[t.category] || catMeta.Fiscal;
        return { id: t.id, title: t.title, category: t.category, pct,
          catBadge: `font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:${cm.bg};color:${cm.fg}`,
          barStyle: `width:${pct}%;height:100%;border-radius:99px;background:${progColor(pct)}`,
          statusLabel: statusLabel(pct), statusStyle: statusStyle(pct),
          onOpen: () => this.st(() => ({ tab: 'tasks', view: 'detail', detailTaskId: t.id, detailActiveClient: dClient.id })) };
      });
      clientDetail = { name: dClient.name, setor: dClient.setor, regime: dClient.regime, ini: dClient.ini, pct: dClient.pct, status: dClient.status,
        avStyle: `width:46px;height:46px;flex:none;border-radius:99px;background:${dClient.color};color:#fff;display:grid;place-items:center;font-size:17px;font-weight:700`,
        badge: `font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;text-align:center;background:${(stColor[dClient.status] || stColor['Em dia'])[0]};color:${(stColor[dClient.status] || stColor['Em dia'])[1]}`,
        respName: p.name, respAv: av(p, 22), respIni: p.ini,
        taskCount: clientDetailTasks.length, noTasks: clientDetailTasks.length === 0,
        openCount: clientDetailTasks.filter(t => t.pct < 100).length, doneCount: clientDetailTasks.filter(t => t.pct >= 100).length };
    }

    // ---- add client ----
    const palette = ['#4653d6', '#0e7a6f', '#b3512e', '#5b5f6b', '#8a4fd3', '#1d6fb8', '#c9435a', '#2f8f6f'];
    const iniOf = (name) => (name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase() || '??');
    const addClientsBulk = (rows) => this.st(st => ({ clients: [...st.clients, ...rows.map((r, i) => ({ id: 'c' + Date.now() + i, ini: iniOf(r.name), color: palette[(st.clients.length + i) % palette.length], name: r.name, setor: r.setor || 'Não informado', regime: r.regime || 'Simples Nacional', resp: st.team[0] ? st.team[0].id : 'mc', pct: 0, status: 'Em dia' }))] }));
    const parseRows = (text) => text.split('\n').map(l => l.trim()).filter(Boolean)
      .map(l => l.split(',').map(c => c.trim()))
      .filter(cols => cols[0] && !/^nome$/i.test(cols[0]))
      .map(cols => ({ name: cols[0], setor: cols[1] || '', regime: cols[2] || '' }));
    const batchRows = parseRows(s.batchText);

    // ---- team ----
    const permBadgeStyle = (perm) => `align-self:flex-start;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;background:${perm === 'Admin' ? '#eef1ff' : '#f4f4f2'};color:${perm === 'Admin' ? accent : '#6b6e78'}`;
    const teamList = s.team.map(m => {
      const inUse = s.tasks.some(t => t.people.includes(m.id)) || s.clients.some(c => c.resp === m.id);
      return { ...m, avStyle: av(m, 34), permBadge: permBadgeStyle(m.permissao || 'Membro'),
        canRemove: !inUse && s.team.length > 1, locked: inUse,
        onRemove: () => this.st(st => ({ team: st.team.filter(x => x.id !== m.id) })) };
    });
    const memberColorSwatches = palette.map(c => ({ color: c, pick: () => this.st(() => ({ newMemberColor: c })),
      style: `width:22px;height:22px;border-radius:7px;cursor:pointer;background:${c};border:2px solid ${s.newMemberColor === c ? '#1c1e26' : 'transparent'}` }));

    // ---- IBS/CBS ----
    const ibsSub = s.ibsSubTab;
    const ibsAddType = s.ibsAddType;
    const addPillStyle = (active) => `font-size:12.5px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;color:${active ? '#fff' : '#4b4e58'};background:${active ? accent : '#fff'};border:1px solid ${active ? accent : '#e2e2de'}`;
    const parseIbsCodeRows = (text) => text.split('\n').map(l => l.trim()).filter(Boolean)
      .map(l => l.split(',').map(c => c.trim())).filter(cols => cols[0]).map(cols => ({ code: cols[0], desc: cols[1] || '' }));
    const parseIbsProdRows = (text) => text.split('\n').map(l => l.trim()).filter(Boolean)
      .map(l => l.split(',').map(c => c.trim())).filter(cols => cols[0])
      .map(cols => ({ ncm: cols[0], desc: cols[1] || '', cst: cols[2] || '', cclass: cols[3] || '', aliqIbs: cols[4] || '', aliqCbs: cols[5] || '', redIbs: cols[6] || '', redCbs: cols[7] || '' }));
    const ibsBatchRows = ibsAddType === 'produto' ? parseIbsProdRows(s.ibsBatchText) : parseIbsCodeRows(s.ibsBatchText);

    // ---- knowledge base ----
    const note = s.notes[Math.min(s.selNote, s.notes.length - 1)] || { title: '', meta: '', tags: [], paras: [] };
    const notes = s.notes.map((nt, i) => ({ ...nt, key: i, onSel: () => this.st(() => ({ selNote: i })),
      rowStyle: `padding:10px 12px;border-radius:9px;cursor:pointer;${i === s.selNote ? `background:#eef1ff;box-shadow:inset 2.5px 0 0 ${accent}` : ''}` }));

    // ---- flows ----
    const flowList = s.flows.map(f => ({ id: f.id, name: f.name, nodeCount: f.nodes.length + (f.nodes.length === 1 ? ' nó' : ' nós'),
      onOpen: () => this.st(() => ({ flowView: 'canvas', activeFlowId: f.id, selId: null, connect: null, pan: { x: 30, y: 40 }, zoom: 1 })),
      onDelete: (e) => { e.stopPropagation(); this.st(st => ({ flows: st.flows.filter(x => x.id !== f.id) })); } }));
    const goFlowList = () => this.st(() => ({ flowView: 'list', activeFlowId: null, selId: null, connect: null }));
    const createFlow = () => { const id = 'f' + Date.now(); this.st(st => ({ flows: [...st.flows, { id, name: 'Novo fluxo', nodes: [], edges: [] }], flowView: 'canvas', activeFlowId: id, selId: null, pan: { x: 30, y: 40 }, zoom: 1 })); };
    const onFlowNameChange = (e) => { const v = e.target.value; this.st(st => ({ flows: st.flows.map(f => f.id === st.activeFlowId ? { ...f, name: v } : f) })); };
    const activeFlow = s.flows.find(f => f.id === s.activeFlowId) || null;

    const NW = this.NW, NH = this.NH;
    let edges = [], nodes = [], pendingD = '', sel = null, nodeColors = [];
    if (activeFlow) {
      const pos = Object.fromEntries(activeFlow.nodes.map(n => [n.id, n]));
      edges = activeFlow.edges.map(([a, b], i) => {
        const A = pos[a], B = pos[b]; if (!A || !B) return null;
        const fx = A.x + NW, fy = A.y + NH / 2, tx = B.x, ty = B.y + NH / 2;
        return { key: i, d: `M ${fx} ${fy} C ${fx + 60} ${fy}, ${tx - 60} ${ty}, ${tx} ${ty}`,
          onDel: () => this.st(st => ({ flows: st.flows.map(f => f.id === st.activeFlowId ? { ...f, edges: f.edges.filter((_, k) => k !== i) } : f) })) };
      }).filter(Boolean);
      nodes = activeFlow.nodes.map(n => ({ ...n,
        style: `position:absolute;left:${n.x}px;top:${n.y}px;width:${NW}px;min-height:${NH}px;background:#fff;border:1.5px solid ${s.selId === n.id ? accent : '#e2e2de'};border-radius:11px;padding:10px 12px;cursor:grab;box-shadow:${s.selId === n.id ? '0 6px 18px rgba(70,83,214,.18)' : '0 2px 6px rgba(20,20,30,.06)'};user-select:none`,
        dot: `width:9px;height:9px;flex:none;border-radius:3px;background:${n.color}`,
        portStyle: `position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:13px;height:13px;border-radius:99px;background:${accent};border:2.5px solid #fff;cursor:crosshair;box-shadow:0 1px 3px rgba(20,20,30,.25);transition:transform .12s`,
        onDown: (e) => { e.stopPropagation(); const pt = this.cvPoint(e); this.st(() => ({ drag: { id: n.id, dx: pt.x - n.x, dy: pt.y - n.y }, selId: n.id })); },
        onUp: (e) => { if (s.connect && s.connect.from !== n.id) { e.stopPropagation(); this.st(st => ({ connect: null, flows: st.flows.map(f => f.id === st.activeFlowId ? { ...f, edges: f.edges.some(([a, b]) => a === st.connect.from && b === n.id) ? f.edges : [...f.edges, [st.connect.from, n.id]] } : f) })); } },
        portDown: (e) => { e.stopPropagation(); const pt = this.cvPoint(e); this.st(() => ({ connect: { from: n.id, mx: pt.x, my: pt.y }, drag: null })); } }));
      if (s.connect) { const A = pos[s.connect.from]; if (A) { const fx = A.x + NW, fy = A.y + NH / 2; pendingD = `M ${fx} ${fy} C ${fx + 50} ${fy}, ${s.connect.mx - 50} ${s.connect.my}, ${s.connect.mx} ${s.connect.my}`; } }
      sel = activeFlow.nodes.find(n => n.id === s.selId);
      nodeColors = ['#4653d6', '#0e7a6f', '#b3512e', '#5b5f6b'].map(c => ({ color: c,
        pick: () => this.st(st => ({ flows: st.flows.map(f => f.id === st.activeFlowId ? { ...f, nodes: f.nodes.map(n => n.id === st.selId ? { ...n, color: c } : n) } : f) })),
        sw: `width:22px;height:22px;border-radius:7px;cursor:pointer;background:${c};border:2px solid ${sel && sel.color === c ? '#1c1e26' : 'transparent'}` }));
    }

        <aside style={S(`width:232px;flex:none;background:#ffffff;border-right:1px solid #e7e7e3;display:flex;flex-direction:column;padding:18px 12px 14px`)}>
          <div style={S(`display:flex;align-items:center;gap:10px;padding:0 10px 18px`)}>
            <div style={S(`width:30px;height:30px;border-radius:8px;background:${ACCENT};display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px`)}>R</div>
            <div>
              <div style={S(`font-weight:700;font-size:13.5px;letter-spacing:-.01em`)}>{g.brandName}</div>
              <div style={S(`font-size:10.5px;color:#8a8d98`)}>Gestão da transição</div>
            </div>
          </div>
          <nav style={S(`display:flex;flex-direction:column;gap:2px`)}>
            <div onClick={g.tabDash.go} className="hv-nav" style={S(g.tabDash.style)}><svg width="15" height="15" viewBox="0 0 15 15"><rect x="1" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor"></rect><rect x="8.5" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".45"></rect><rect x="1" y="8.5" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".45"></rect><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.5" fill="currentColor"></rect></svg>Visão geral</div>
            <div onClick={g.tabTasks.go} className="hv-nav" style={S(g.tabTasks.style)}><svg width="15" height="15" viewBox="0 0 15 15"><rect x="1" y="1" width="13" height="13" rx="3" fill="none" stroke="currentColor" strokeWidth="1.6"></rect><path d="M4.5 7.5l2 2 4-4" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"></path></svg>Tarefas</div>
            <div onClick={g.tabCal.go} className="hv-nav" style={S(g.tabCal.style)}><svg width="15" height="15" viewBox="0 0 15 15"><rect x="1" y="2.5" width="13" height="11.5" rx="2.5" fill="none" stroke="currentColor" strokeWidth="1.6"></rect><line x1="1" y1="6" x2="14" y2="6" stroke="currentColor" strokeWidth="1.6"></line></svg>Prazos</div>
            <div onClick={g.tabFlow.go} className="hv-nav" style={S(g.tabFlow.style)}><FlowIcon />Fluxos</div>
            <div onClick={g.tabCli.go} className="hv-nav" style={S(g.tabCli.style)}><svg width="15" height="15" viewBox="0 0 15 15"><circle cx="5.5" cy="5" r="2.6" fill="currentColor"></circle><path d="M1.5 13c.5-3 2.3-4.3 4-4.3s3.5 1.3 4 4.3z" fill="currentColor"></path><circle cx="11" cy="5.5" r="2" fill="currentColor" opacity=".45"></circle></svg>Clientes</div>
            <div onClick={g.tabTeam.go} className="hv-nav" style={S(g.tabTeam.style)}><svg width="15" height="15" viewBox="0 0 15 15"><circle cx="5.5" cy="4.2" r="2.3" fill="currentColor"></circle><circle cx="11" cy="5" r="1.8" fill="currentColor" opacity=".5"></circle><path d="M1.3 13c.4-2.8 2.1-4 4.2-4s3.8 1.2 4.2 4z" fill="currentColor"></path><path d="M10 9.3c1.6.2 2.6 1.3 2.9 3.2" fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" opacity=".6"></path></svg>Equipe</div>
            <div onClick={g.tabIbs.go} className="hv-nav" style={S(g.tabIbs.style)}><svg width="15" height="15" viewBox="0 0 15 15"><rect x="1" y="1" width="13" height="13" rx="2" fill="none" stroke="currentColor" strokeWidth="1.5"></rect><line x1="1" y1="5.3" x2="14" y2="5.3" stroke="currentColor" strokeWidth="1.3"></line><line x1="5.3" y1="5.3" x2="5.3" y2="14" stroke="currentColor" strokeWidth="1.3"></line><line x1="9.6" y1="5.3" x2="9.6" y2="14" stroke="currentColor" strokeWidth="1.3"></line></svg>IBS e CBS</div>
            <div onClick={g.tabKb.go} className="hv-nav" style={S(g.tabKb.style)}><svg width="15" height="15" viewBox="0 0 15 15"><path d="M2 2.5A1.5 1.5 0 013.5 1H13v11.5H3.5A1.5 1.5 0 002 14z" fill="none" stroke="currentColor" strokeWidth="1.6"></path><line x1="2" y1="11.5" x2="13" y2="11.5" stroke="currentColor" strokeWidth="1.6"></line></svg>Base de conhecimento</div>
          </nav>
          <div style={S(`margin-top:auto;padding:12px 10px;background:#f7f7f4;border-radius:10px`)}>
            <div style={S(`font-size:10.5px;font-weight:600;color:#6b6e78;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px`)}>Fase atual</div>
            <div style={S(`font-size:12.5px;font-weight:600`)}>{g.phaseNow.title}</div>
            <div style={S(`font-size:11px;color:#8a8d98;margin-top:2px`)}>{g.phaseNow.desc}</div>
            <div style={S(`height:5px;background:#e7e7e3;border-radius:99px;margin-top:8px;overflow:hidden`)}><div style={S(`width:${g.yearPct}%;height:100%;background:${ACCENT};border-radius:99px`)}></div></div>
            <div style={S(`font-size:10px;color:#8a8d98;margin-top:4px;font-family:'JetBrains Mono',monospace`)}>{g.yearPct}% do ano decorrido</div>
          </div>
          <div onClick={g.logout} className="hv-danger" style={S(`margin-top:10px;font-size:11px;font-weight:600;color:#8a8d98;cursor:pointer;padding:4px 10px`)}>Sair da conta</div>
        </aside>
        <main style={S(`flex:1;display:flex;flex-direction:column;min-width:0`)}>
          <header style={S(`height:56px;flex:none;background:#fff;border-bottom:1px solid #e7e7e3;display:flex;align-items:center;gap:14px;padding:0 22px`)}>
            <div style={S(`font-size:15px;font-weight:700;letter-spacing:-.01em`)}>{g.tabTitle}</div>
            <div style={S(`font-size:11px;color:#8a8d98;font-family:'JetBrains Mono',monospace`)}>{g.headerDate}</div>
            <div style={S(`margin-left:auto;display:flex;align-items:center;gap:10px`)}>
              <div style={S(`display:flex`)}>
                {g.team.map((p) => <div key={p.id} style={S(p.avStyle)} title={p.name}>{p.ini}</div>)}
              </div>
            </div>
          </header>
          <div style={S(`flex:1;overflow:auto;min-height:0`)}>
            {g.isDash ? this.renderDash(g) : null}
            {g.isTasks && g.viewList ? this.renderTaskList(g) : null}
            {g.isTasks && g.viewCreate ? this.renderTaskCreate(g) : null}
            {g.isTasks && g.viewDetail ? this.renderTaskDetail(g) : null}
            {g.isTasks && !g.viewList && !g.viewCreate && !g.viewDetail ? this.renderTaskList(g) : null}
            {g.isCal ? this.renderPrazos(g) : null}
            {g.isFlow && g.flowViewList ? this.renderFlowList(g) : null}
            {g.isFlow && g.flowViewCanvas ? this.renderFlowCanvas(g) : null}
            {g.isFlow && !g.flowViewList && !g.flowViewCanvas ? this.renderFlowList(g) : null}
            {g.isCli && g.clientViewList ? this.renderClientList(g) : null}
            {g.isCli && g.clientViewAdd ? this.renderClientAdd(g) : null}
            {g.isCli && g.clientViewDetail ? this.renderClientDetail(g) : null}
            {g.isCli && !g.clientViewList && !g.clientViewAdd && !g.clientViewDetail ? this.renderClientList(g) : null}
            {g.isTeam ? this.renderTeam(g) : null}
            {g.isIbs ? this.renderIbs(g) : null}
            {g.isKb ? this.renderKb(g) : null}
          </div>
        </main>
      </div>
    );
  }

  render() {
    const g = this.renderVals();
    if (g.isLogin) return this.renderLogin(g);
    if (g.isSignup) return this.renderSignup(g);
    return this.renderApp(g);
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
